name: Lint diagnostics
on:
  pull_request:
  push:
    branches:
      - ros2-kilted
  schedule:
    # Run every week at 20:00 on Sunday
    - cron: "0 20 * * 0"

jobs:
  ament_lint:
    name: Ament lint
    runs-on: ubuntu-24.04
    env:
      AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: 1
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ros-tooling/setup-ros@0.7.18
        with:
          required-ros-distributions: rolling
      - name: Run ament linters
        run: |
          source /opt/ros/rolling/setup.bash
          linters=(cppcheck cpplint flake8 pep257 uncrustify xmllint)
          packages=(
            diagnostic_aggregator diagnostic_common_diagnostics
            diagnostic_remote_logging diagnostic_updater self_test
          )
          sudo apt-get install -y "${linters[@]/#/ros-rolling-ament-}"
          failed=()
          for linter in "${linters[@]}"; do
            echo "::group::ament_${linter}"
            ament_"${linter}" "${packages[@]}" || failed+=("${linter}")
            echo "::endgroup::"
          done
          [[ ${#failed[@]} -eq 0 ]] || { echo "Failed linters: ${failed[*]}"; exit 1; }

  check_licenses:
    name: Check licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: boschresearch/ros_license_toolkit@2.0.2
